services:
  backend:
    build:
      context: ./docker-compose/php-fpm
      dockerfile: Dockerfile
      args:
        user: enrico
        uid: 1000
        basepath: ${BASE_PATH}
    image: unicontr
    container_name: unicontr-backend
    working_dir: ${BASE_PATH}
    volumes:
      - ../unicontract-backend:${BASE_PATH}
    networks:
      - app-network
    depends_on:
      - db
    # ports:
    #   - "9000:9000"

  db:
    image: mariadb:10.11
    container_name: unicontr-db
    restart: unless-stopped
    ports:
      - "3308:3306"   # only if you want host access
    environment:
      MYSQL_DATABASE: unicontr
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_USER: unicontr
      MYSQL_PASSWORD: secret    
    volumes:
      - ./docker-compose/mysql/my.cnf:/etc/mysql/my.cnf 
    networks:
      - app-network

  idp: 
    build:
      context: ../unicontract-mock-idp
      dockerfile: ../unicontract-docker/docker-compose/mock-idp/Dockerfile 
    container_name: unicontr-idp
    ports:
      - "7000:7000"
    volumes:
      - ../unicontract-mock-idp/start.js:/usr/src/app/start.js
    command: 
        bash -c "node start.js"
  
  frontend:
    build: 
      context: ../unicontract-frontend
      dockerfile: ../unicontract-docker/docker-compose/angular/Dockerfile 
    container_name: unicontract-frontend
    ports:
      - "4200:4200"
    environment:
      SHELL: /bin/bash
      NODE_ENV: development
    volumes:
      - ../unicontract-frontend:/usr/src/app
       # the volume above prevents our host system's node_modules to be mounted
      - exclude:/usr/src/app/node_modules/

    command: 
        bash -c "ng serve --host 0.0.0.0 --port 4200 --poll 500"

  nginx:
    image: nginx:alpine
    container_name: unicontr-nginx
    tty: true
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../unicontract-backend:${BASE_PATH}
      - ./docker-compose/nginx/conf.d/:/etc/nginx/conf.d/
    networks:
      - app-network

volumes:
  exclude:

networks:
  app-network:
    driver: bridge

    